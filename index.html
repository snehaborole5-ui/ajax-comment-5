<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comment Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

    <div class="spinner d-none" id="spinner">
        <div class="spinner-border text-primary" role="status">
            <span class="sr-only">Loading...</span>
        </div>
    </div>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4 shadow-sm">
                    <h2 class="text-center mb-4 text-secondary font-weight-bold">Comment Form</h2>
                    <form id="commentForm">
                        <div class="form-group">
                            <label for="name">Name*</label>
                            <input type="text" id="name" class="form-control" placeholder="jhone doe" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email*</label>
                            <input type="email" id="email" class="form-control" placeholder="abc@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="body">Comment*</label>
                            <textarea id="body" class="form-control" rows="4" placeholder="Write Your Comment..." required></textarea>
                        </div>
                        <div class="form-group">
    						<label for="userId">UserId*</label>
    							<select id="userId" class="form-control" required>
       								 <option value="" disabled selected>Select User ID</option>
       								 <option value="1">1</option>
       								 <option value="2">2</option>
       								 <option value="3">3</option>
									 <option value="4">4</option>
									 <option value="5">5</option>
									 <option value="6">6</option>
									 <option value="7">7</option>
									 <option value="8">8</option>
									 <option value="9">9</option>
									 <option value="10">10</option>
    </select>
</div>
                        
                        <button type="submit" id="addCommentBtn" class="btn btn-danger btn-block py-2">Add Comment</button>
                        <button type="button" id="updateCommentBtn" class="btn btn-success btn-block py-2 d-none">Update Comment</button>
                    </form>
                </div>
            </div>
        </div>

        <hr class="my-5">

        <h3 class="mb-4 text-dark font-weight-bold">All Comments</h3>
        <div class="row" id="commentContainer">
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./assets/js/app.js"></script>
</body>
</html>
